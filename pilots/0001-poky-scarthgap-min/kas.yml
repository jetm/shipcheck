# kas-container build configuration for pilot 0001.
#
# Target: poky Scarthgap, qemux86-64, core-image-minimal
# Inherits: create-spdx + cve-check, so the shipcheck pilot has
# real SPDX documents under tmp/deploy/spdx/ and a real CVE summary
# at tmp/log/cve/cve-summary.json to audit against.
#
# Poky source: upstream git URL
# https://git.yoctoproject.org/poky.git pinned to commit
# cb2dcb4963e5fbe449f1bcb019eae883ddecc8ec, which is reachable from
# the `scarthgap` LTS branch. Using the upstream URL lets
# kas-container clone poky fresh into its own /work/poky without
# any host bind-mounts.
#
# Designed to run with vanilla kas-container from the shipcheck
# repo root:
#
#     kas-container build pilots/0001-poky-scarthgap-min/kas.yml
#
# No --runtime-args and no host-specific bind-mounts are required.
# The first clone of poky takes ~30-60 seconds over the network.
#
# Cache reuse: kas-container auto-mounts $DL_DIR as /downloads and
# $SSTATE_DIR as /sstate inside the container when those env vars
# are set on the host, so subsequent pilots reuse downloads and
# sstate artefacts. See docs/pilot.md for the recommended env-var
# setup.

header:
  version: 14

distro: poky
machine: qemux86-64
target: core-image-minimal

repos:
  # The shipcheck repo itself - no layers to add, just lets kas
  # anchor relative paths against this file's location. The
  # `layers: {}` override stops kas from treating the repo root
  # as a layer (default behaviour when layers is omitted).
  shipcheck:
    layers: {}

  poky:
    # Upstream Yocto poky, pinned to a Scarthgap LTS commit so
    # kas-container can clone it fresh into /work/poky without
    # needing any host bind-mounts. The commit below is reachable
    # from branch `scarthgap` (it is a doc fix in the LTS line);
    # pilot 0001 verified this. First-time clone is ~30-60s over
    # the network; subsequent pilots reuse DL_DIR and SSTATE_DIR
    # (see docs/pilot.md).
    url: https://git.yoctoproject.org/poky.git
    branch: scarthgap
    commit: cb2dcb4963e5fbe449f1bcb019eae883ddecc8ec
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

# Forward host environment variables to bitbake via
# BB_ENV_PASSTHROUGH_ADDITIONS. kas-container forwards these via
# `-e <VAR>` into the container; kas then exposes them to bitbake.
#
# null value means "only forward if the caller has it set" with no
# committed default - the right pattern for secrets.
env:
  NVDCVE_API_KEY:

local_conf_header:
  shipcheck-pilot: |
    # Enable the two Yocto classes whose output shipcheck audits:
    # create-spdx produces tmp/deploy/spdx/*.spdx.json documents and
    # cve-check produces per-recipe CVE reports plus the aggregate
    # summary at tmp/log/cve/cve-summary.json.
    INHERIT += "create-spdx cve-check"

    # cve-check defaults. The aggregate summary path is hardcoded
    # here so shipcheck's yocto-cve-check finder can locate it
    # regardless of any distro-level override.
    CVE_CHECK_DB_UPDATE = "1"
    CVE_CHECK_FORMAT_JSON = "1"
    CVE_CHECK_SUMMARY_DIR = "${LOG_DIR}/cve"
    CVE_CHECK_SUMMARY_FILE_NAME_JSON = "cve-summary.json"
    CVE_CHECK_LOG_JSON = "${CVE_CHECK_SUMMARY_DIR}/${CVE_CHECK_SUMMARY_FILE_NAME_JSON}"

    # Keep the build deterministic-ish for the pilot: one thread per
    # CPU core, standard sstate reuse. Anyone re-running the pilot
    # can override via environment variables.
    BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"
    PARALLEL_MAKE    ?= "-j ${@oe.utils.cpu_count()}"

    # create-spdx options. Default SPDX_INCLUDE_SOURCES is off; we
    # leave it off because pilot 0001 only audits the metadata
    # layer, not the source archive layer. Flip to "1" in later
    # pilots if license-audit needs source-file granularity.
    SPDX_INCLUDE_SOURCES = "0"

    # Make the SBOM and CVE outputs reproducible enough to diff
    # across re-runs of the same pilot.
    BB_HASHCONFIG_IGNORE_VARS += "DATE TIME"
