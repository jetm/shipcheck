# shipcheck-pilot
# Enable the two Yocto classes whose output shipcheck audits:
# create-spdx produces tmp/deploy/spdx/*.spdx.json documents and
# cve-check produces per-recipe CVE reports plus the aggregate
# summary at tmp/log/cve/cve-summary.json.
INHERIT += "create-spdx cve-check"

# cve-check defaults. The cve-check.bbclass task
# do_cve_check_write_rootfs_manifest creates a symlink at
# ${LOG_DIR}/cve/cve-summary.json pointing at the latest per-image
# aggregate manifest, and shipcheck's yocto-cve-check reads that
# symlink directly - so no path override is needed here.
#
# Do NOT override CVE_CHECK_LOG_JSON, CVE_CHECK_SUMMARY_DIR, or
# CVE_CHECK_SUMMARY_FILE_NAME_JSON. CVE_CHECK_LOG_JSON defaults to
# ${T}/cve.json (the per-recipe temp dir, always exists); pointing
# it at the aggregate summary path causes the first recipe's
# do_cve_check to FileNotFoundError because the aggregate dir is
# only created later by the per-image manifest task. See
# docs/pilot.md Troubleshooting for the full story.
CVE_CHECK_DB_UPDATE = "1"
CVE_CHECK_FORMAT_JSON = "1"

# Keep the build deterministic-ish for the pilot: one thread per
# CPU core, standard sstate reuse. Anyone re-running the pilot
# can override via environment variables.
BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"
PARALLEL_MAKE    ?= "-j ${@oe.utils.cpu_count()}"

# create-spdx options. Default SPDX_INCLUDE_SOURCES is off; we
# leave it off because pilot 0001 only audits the metadata
# layer, not the source archive layer. Flip to "1" in later
# pilots if license-audit needs source-file granularity.
SPDX_INCLUDE_SOURCES = "0"

# Make the SBOM and CVE outputs reproducible enough to diff
# across re-runs of the same pilot.
BB_HASHCONFIG_IGNORE_VARS += "DATE TIME"

MACHINE ??= "qemux86-64"
DISTRO ??= "poky"
BBMULTICONFIG ?= ""
